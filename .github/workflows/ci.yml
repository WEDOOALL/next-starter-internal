name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Quality — lint, typecheck, unit tests, build
  # ───────────────────────────────────────────────────────────────────────────
  quality:
    name: Lint + Typecheck + Test + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # IMPORTANT: do NOT pass `with: version: ...` here — it conflicts with the
      # `packageManager` field in package.json (ERR_PNPM_BAD_PM_VERSION).
      # pnpm/action-setup@v4 reads packageManager automatically.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      # Aceternity UI Pro registry (private, premium components).
      # ACETERNITY_LICENSE secret must be set at repo or org level.
      - name: Configure Aceternity registry
        if: env.ACETERNITY_LICENSE != ''
        env:
          ACETERNITY_LICENSE: ${{ secrets.ACETERNITY_LICENSE }}
        run: |
          echo "@aceternity:registry=https://ui.aceternity.com/registry" >> .npmrc
          echo "//ui.aceternity.com/:_authToken=${ACETERNITY_LICENSE}" >> .npmrc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJdummy

  # ───────────────────────────────────────────────────────────────────────────
  # Security — Trivy filesystem scan
  # ───────────────────────────────────────────────────────────────────────────
  security:
    name: Security scan (Trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: "fs"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH"

  # ───────────────────────────────────────────────────────────────────────────
  # Secrets scan — TruffleHog (OSS, gratuit, ~700 secret types)
  # gitleaks-action@v2 a basculé en payant pour les organizations en 2023 →
  # remplacé par TruffleHog qui est l'option OSS de référence.
  # ───────────────────────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets scan (TruffleHog)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ""
          head: ${{ github.ref_name }}
          extra_args: --only-verified

  # ───────────────────────────────────────────────────────────────────────────
  # pnpm audit — bloque sur HIGH/CRITICAL CVE
  # ───────────────────────────────────────────────────────────────────────────
  audit:
    name: pnpm audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Audit
        run: pnpm audit --audit-level=high
        continue-on-error: false

  # ───────────────────────────────────────────────────────────────────────────
  # Quality Gates Web — Lighthouse + axe-core (PR-only, informatif)
  # ───────────────────────────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Configure Aceternity registry
        if: env.ACETERNITY_LICENSE != ''
        env:
          ACETERNITY_LICENSE: ${{ secrets.ACETERNITY_LICENSE }}
        run: |
          echo "@aceternity:registry=https://ui.aceternity.com/registry" >> .npmrc
          echo "//ui.aceternity.com/:_authToken=${ACETERNITY_LICENSE}" >> .npmrc

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJdummy

      - name: Run Lighthouse CI
        run: pnpm lighthouse
        continue-on-error: true
        # PR feedback only — does not block merge while we calibrate baselines.
        # Flip to `false` once perf/a11y budgets are stable per app.

  a11y:
    name: Accessibility (axe-core via Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Configure Aceternity registry
        if: env.ACETERNITY_LICENSE != ''
        env:
          ACETERNITY_LICENSE: ${{ secrets.ACETERNITY_LICENSE }}
        run: |
          echo "@aceternity:registry=https://ui.aceternity.com/registry" >> .npmrc
          echo "//ui.aceternity.com/:_authToken=${ACETERNITY_LICENSE}" >> .npmrc

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run a11y e2e
        run: pnpm test:e2e
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJdummy
